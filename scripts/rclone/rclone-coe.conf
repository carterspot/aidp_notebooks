# rclone remote config for the OCI Object Storage bucket that backs
# the AIDP volume  /Volumes/cbtest_standard_catalog/default/COE_Allocations/
#
# Copy this block into your rclone config. Find its location with:
#   rclone config file
# (typically  C:\Users\<you>\AppData\Roaming\rclone\rclone.conf )
#
# Replace every <PLACEHOLDER>. See README.md for where each value comes from.

[coe]
type           = oracleobjectstorage
provider       = user_principal_auth
namespace      = <OBJECT_STORAGE_NAMESPACE>
compartment    = <COMPARTMENT_OCID>
region         = <REGION>            # e.g. us-ashburn-1
config_file    = ~/.oci/config       # standard OCI API-key config (see README)
config_profile = DEFAULT
